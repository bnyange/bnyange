name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: bnyange
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        run: |
          sudo cp dist/github-snake.svg /tmp/github-snake.svg
          sudo cp dist/github-snake-dark.svg /tmp/github-snake-dark.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin output || true
          git checkout --orphan output-new
          git rm -rf .
          cp /tmp/github-snake.svg github-snake.svg
          cp /tmp/github-snake-dark.svg github-snake-dark.svg
          git add github-snake.svg github-snake-dark.svg
          git commit -m "chore: update snake animation"
          git push -f origin output-new:output
